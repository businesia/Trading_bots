<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trading Dashboard — Wall Street Terminal</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    :root[data-theme="dark"] {
      --bg-primary: #0a0e1a;
      --bg-panel: #111827;
      --bg-panel-header: #1a2234;
      --border: #1e2d4a;
      --text-primary: #e2e8f0;
      --text-secondary: #64748b;
      --text-muted: #1e2d4a;
      --accent-green: #00d4aa;
      --accent-red: #ff4757;
      --accent-blue: #3b82f6;
      --accent-yellow: #f59e0b;
      --accent-purple: #a855f7;
      --font-mono: 'Courier New', monospace;
    }
    :root[data-theme="light"] {
      --bg-primary: #f0f4f8;
      --bg-panel: #ffffff;
      --bg-panel-header: #e8edf5;
      --border: #d1dce8;
      --text-primary: #1e293b;
      --text-secondary: #475569;
      --text-muted: #d1dce8;
      --accent-green: #059669;
      --accent-red: #dc2626;
      --accent-blue: #2563eb;
      --accent-yellow: #d97706;
      --accent-purple: #7c3aed;
      --font-mono: 'Courier New', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 12px;
      min-height: 100vh;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      background: var(--bg-panel-header);
      border-bottom: 1px solid var(--border);
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-logo {
      color: var(--accent-green);
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 2px;
      margin-right: 8px;
    }
    .topbar-clock {
      color: var(--accent-green);
      font-size: 13px;
      font-weight: bold;
      min-width: 75px;
    }
    .topbar-date {
      color: var(--text-secondary);
      font-size: 11px;
    }
    .separator { color: var(--border); }
    .topbar-ticker {
      display: flex;
      gap: 16px;
      flex: 1;
      overflow: hidden;
    }
    .ticker-item { display: flex; gap: 5px; align-items: baseline; white-space: nowrap; }
    .ticker-sym { color: var(--accent-blue); font-size: 11px; }
    .ticker-price { color: var(--text-primary); font-size: 11px; }
    .up { color: var(--accent-green); }
    .down { color: var(--accent-red); }
    .neutral { color: var(--text-secondary); }
    .mode-badge {
      padding: 2px 10px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 1px;
      cursor: pointer;
    }
    .mode-demo { background: var(--accent-yellow); color: #000; }
    .mode-live { background: var(--accent-green); color: #000; }
    .topbar-hint {
      color: var(--text-secondary);
      font-size: 10px;
      white-space: nowrap;
    }
    .btn {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 4px 12px;
      border-radius: 3px;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      transition: border-color 0.15s;
    }
    .btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

    /* ── Grid ── */
    .grid {
      display: grid;
      gap: 8px;
      padding: 8px;
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    }
    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .panel:hover { border-color: var(--accent-blue); }
    .panel-wide { grid-column: 1 / -1; }
    .panel-header {
      background: var(--bg-panel-header);
      padding: 7px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .panel-title {
      color: var(--text-secondary);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    .panel-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 2px;
      background: rgba(59,130,246,0.12);
      color: var(--accent-blue);
    }
    .panel-body { padding: 14px; }

    /* ── Price panels ── */
    .price-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
    .price-main { font-size: 32px; font-weight: bold; color: var(--text-primary); line-height: 1; }
    .price-change { font-size: 14px; font-weight: bold; }
    .price-sub {
      display: flex;
      gap: 16px;
      margin-top: 6px;
      color: var(--text-secondary);
      font-size: 10px;
    }
    .price-sub span { display: flex; flex-direction: column; gap: 1px; }
    .price-sub strong { color: var(--text-primary); font-size: 11px; }

    /* ── Watchlist ── */
    .watchlist {
      width: 100%;
      border-collapse: collapse;
    }
    .watchlist th {
      color: var(--text-secondary);
      font-size: 10px;
      text-align: right;
      padding: 5px 10px;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .watchlist th:first-child { text-align: left; }
    .watchlist td {
      padding: 7px 10px;
      border-bottom: 1px solid var(--text-muted);
      text-align: right;
      font-size: 12px;
    }
    .watchlist td:first-child { text-align: left; color: var(--accent-blue); font-weight: bold; }
    .watchlist tr:hover td { background: var(--bg-panel-header); }
    .watchlist tr:last-child td { border-bottom: none; }

    /* ── Risk metrics ── */
    .metrics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }
    .metric-item {
      padding: 10px 12px;
      background: var(--bg-panel-header);
      border-radius: 4px;
      border: 1px solid var(--border);
    }
    .metric-label {
      color: var(--text-secondary);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .metric-value { font-size: 20px; font-weight: bold; }
    .metric-sub { font-size: 10px; color: var(--text-secondary); margin-top: 2px; }

    /* ── Regime panel ── */
    .regime-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .regime-badge {
      display: inline-block;
      padding: 5px 14px;
      border-radius: 3px;
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .regime-bull { background: rgba(0,212,170,0.12); color: var(--accent-green); border: 1px solid rgba(0,212,170,0.3); }
    .regime-bear { background: rgba(255,71,87,0.12); color: var(--accent-red); border: 1px solid rgba(255,71,87,0.3); }
    .regime-range { background: rgba(245,158,11,0.12); color: var(--accent-yellow); border: 1px solid rgba(245,158,11,0.3); }
    .regime-volatile { background: rgba(59,130,246,0.12); color: var(--accent-blue); border: 1px solid rgba(59,130,246,0.3); }
    .regime-conf { color: var(--text-secondary); font-size: 11px; }
    .regime-strat {
      font-size: 11px;
      color: var(--text-secondary);
      padding: 6px 10px;
      background: var(--bg-panel-header);
      border-radius: 3px;
      border-left: 2px solid var(--accent-green);
      margin-bottom: 14px;
    }
    .prob-bar { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
    .prob-label { width: 90px; color: var(--text-secondary); font-size: 10px; text-align: right; }
    .prob-track {
      flex: 1;
      background: var(--text-muted);
      border-radius: 2px;
      height: 5px;
      overflow: hidden;
    }
    .prob-fill { height: 5px; border-radius: 2px; }
    .prob-pct { width: 32px; text-align: right; font-size: 10px; color: var(--text-primary); }

    /* ── P&L curve ── */
    .pnl-stats {
      display: flex;
      gap: 20px;
      margin-bottom: 10px;
    }
    .pnl-stat label { color: var(--text-secondary); font-size: 10px; display: block; }
    .pnl-stat span { font-size: 16px; font-weight: bold; }

    /* ── Order book ── */
    .book-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .book-side { }
    .book-title { color: var(--text-secondary); font-size: 10px; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px; }
    .book-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      font-size: 11px;
      border-bottom: 1px solid var(--text-muted);
      position: relative;
    }
    .book-row-fill {
      position: absolute;
      top: 0; bottom: 0; right: 0;
      opacity: 0.08;
      border-radius: 1px;
    }
    .book-ask .book-row-fill { background: var(--accent-red); }
    .book-bid .book-row-fill { background: var(--accent-green); }
    .book-price-ask { color: var(--accent-red); }
    .book-price-bid { color: var(--accent-green); }
    .book-size { color: var(--text-secondary); }
    .book-spread {
      text-align: center;
      padding: 4px;
      font-size: 10px;
      color: var(--accent-yellow);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin: 4px 0;
    }

    /* ── Signal table ── */
    .signal-table { width: 100%; border-collapse: collapse; }
    .signal-table th {
      color: var(--text-secondary);
      font-size: 10px;
      text-align: left;
      padding: 4px 8px;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
    }
    .signal-table td {
      padding: 6px 8px;
      border-bottom: 1px solid var(--text-muted);
      font-size: 11px;
    }
    .signal-table tr:last-child td { border-bottom: none; }
    .sig-long { color: var(--accent-green); font-weight: bold; }
    .sig-short { color: var(--accent-red); font-weight: bold; }
    .sig-flat { color: var(--text-secondary); }
    .str-bar {
      display: inline-block;
      height: 8px;
      border-radius: 2px;
      vertical-align: middle;
    }

    /* ── Command palette ── */
    .cmd-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 1000;
      align-items: flex-start;
      justify-content: center;
      padding-top: 80px;
    }
    .cmd-overlay.open { display: flex; }
    .cmd-box {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 580px;
      max-height: 420px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .cmd-input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 16px;
      padding: 18px 18px 14px;
      font-family: var(--font-mono);
      border-bottom: 1px solid var(--border);
    }
    .cmd-section-label {
      padding: 8px 18px 4px;
      font-size: 10px;
      text-transform: uppercase;
      color: var(--text-secondary);
      letter-spacing: 1px;
    }
    .cmd-list { overflow-y: auto; }
    .cmd-item {
      padding: 10px 18px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 2px solid transparent;
    }
    .cmd-item.active {
      background: var(--bg-panel-header);
      border-left-color: var(--accent-blue);
    }
    .cmd-item:hover {
      background: var(--bg-panel-header);
      border-left-color: var(--accent-blue);
    }
    .cmd-item-label { color: var(--text-primary); font-size: 13px; }
    .cmd-item-key {
      color: var(--text-secondary);
      font-size: 10px;
      background: var(--bg-panel-header);
      border: 1px solid var(--border);
      padding: 1px 6px;
      border-radius: 3px;
    }

    /* ── Status bar ── */
    .statusbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-panel-header);
      border-top: 1px solid var(--border);
      padding: 4px 16px;
      display: flex;
      gap: 20px;
      font-size: 10px;
      color: var(--text-secondary);
      z-index: 99;
    }
    .statusbar span { display: flex; align-items: center; gap: 4px; }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot-green { background: var(--accent-green); }
    .dot-yellow { background: var(--accent-yellow); }
    .dot-red { background: var(--accent-red); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Animations ── */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .blink { animation: blink 1s infinite; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
    .panel { animation: fadeIn 0.3s ease both; }

    .pb { padding-bottom: 40px; }
  </style>
</head>
<body>

<!-- ── Top bar ── -->
<div class="topbar">
  <span class="topbar-logo">▲ WST</span>
  <span class="topbar-clock" id="clock">--:--:--</span>
  <span class="topbar-date" id="topdate">--</span>
  <span class="separator">│</span>
  <div class="topbar-ticker" id="ticker-strip"></div>
  <span class="separator">│</span>
  <span class="mode-badge mode-demo" id="mode-badge" onclick="toggleMode()">DEMO</span>
  <span class="topbar-hint">T=Theme &nbsp; R=Refresh &nbsp; ⌘K=Commands</span>
  <button class="btn" onclick="toggleTheme()">Theme</button>
  <button class="btn" onclick="openCmdPalette()">⌘K</button>
  <button class="btn" onclick="refresh()">↺ Refresh</button>
</div>

<!-- ── Panels ── -->
<div class="grid pb" id="grid"></div>

<!-- ── Command palette ── -->
<div class="cmd-overlay" id="cmd-overlay" onclick="overlayClick(event)">
  <div class="cmd-box">
    <input class="cmd-input" id="cmd-input" placeholder="Search commands..."
           oninput="filterCmds(this.value)" onkeydown="handleCmdKey(event)">
    <div class="cmd-list" id="cmd-list"></div>
  </div>
</div>

<!-- ── Status bar ── -->
<div class="statusbar">
  <span><span class="dot dot-green blink"></span>MARKETS OPEN</span>
  <span id="sb-last-refresh">Last refresh: --</span>
  <span id="sb-panels">7 panels</span>
  <span style="margin-left:auto"><span class="dot dot-green"></span>Neural-Trader connected</span>
  <span><span class="dot dot-yellow"></span>Alpha Vantage: demo</span>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────
let mode = 'demo';
let theme = localStorage.getItem('wst-theme') || 'dark';
document.documentElement.setAttribute('data-theme', theme);

// ── Clock ─────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-US', { hour12: false });
  document.getElementById('topdate').textContent =
    now.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });
}
setInterval(updateClock, 1000);
updateClock();

// ── Theme ─────────────────────────────────────────────────────────────────
function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('wst-theme', theme);
}

// ── Mode ──────────────────────────────────────────────────────────────────
function toggleMode() {
  mode = mode === 'demo' ? 'live' : 'demo';
  const b = document.getElementById('mode-badge');
  b.textContent = mode.toUpperCase();
  b.className = 'mode-badge ' + (mode === 'demo' ? 'mode-demo' : 'mode-live');
}

// ── Demo data ─────────────────────────────────────────────────────────────
function seed(s) {
  let x = Math.sin(s) * 10000; return x - Math.floor(x);
}
function rng(s) { return { n: seed(s), i: 1, next() { this.i++; return seed(s * this.i + 17); } }; }

function genSeries(n, start, vol, s=42) {
  const r = rng(s), prices = [start];
  for (let i = 1; i < n; i++)
    prices.push(+(prices[i-1] * (1 + (r.next() - 0.49) * vol)).toFixed(4));
  return prices;
}

const TICKERS = [
  { sym:'SPY',     prices: genSeries(252, 521.30, 0.005, 1) },
  { sym:'QQQ',     prices: genSeries(252, 447.88, 0.006, 2) },
  { sym:'AAPL',    prices: genSeries(252, 211.20, 0.008, 3) },
  { sym:'NVDA',    prices: genSeries(252, 127.40, 0.013, 4) },
  { sym:'TSLA',    prices: genSeries(252, 236.80, 0.016, 5) },
  { sym:'MSFT',    prices: genSeries(252, 429.50, 0.006, 6) },
  { sym:'BTC/USD', prices: genSeries(252, 66200,  0.018, 7) },
  { sym:'ETH/USD', prices: genSeries(252, 3540,   0.020, 8) },
  { sym:'EUR/USD', prices: genSeries(252, 1.0812, 0.003, 9) },
  { sym:'GC=F',    prices: genSeries(252, 2381,   0.006, 10) },
];

const RISK = {
  var95:'-1.87%', cvar95:'-2.53%', sharpe:'1.41', sortino:'2.08',
  maxDD:'-8.34%', beta:'0.84', corr:'0.71', vol:'12.4%'
};

const SIGNALS = [
  { sym:'SPY',     sig:'LONG',  str:82, entry:521.30, sl:508.50, tp:548.00, tf:'Daily' },
  { sym:'QQQ',     sig:'LONG',  str:74, entry:447.88, sl:436.00, tp:468.00, tf:'4H'   },
  { sym:'AAPL',    sig:'LONG',  str:68, entry:211.20, sl:205.00, tp:228.00, tf:'Daily' },
  { sym:'NVDA',    sig:'FLAT',  str:51, entry:127.40, sl:null,   tp:null,   tf:'4H'   },
  { sym:'TSLA',    sig:'SHORT', str:71, entry:236.80, sl:248.00, tp:218.00, tf:'Daily' },
  { sym:'BTC/USD', sig:'LONG',  str:77, entry:66200,  sl:62000,  tp:72000,  tf:'4H'   },
  { sym:'ETH/USD', sig:'SHORT', str:63, entry:3540,   sl:3720,   tp:3200,   tf:'Daily' },
  { sym:'EUR/USD', sig:'FLAT',  str:48, entry:1.0812, sl:null,   tp:null,   tf:'4H'   },
];

const REGIMES = [
  { label:'BULL TREND', cls:'regime-bull',     prob:72, color:'#00d4aa' },
  { label:'RANGING',    cls:'regime-range',    prob:17, color:'#f59e0b' },
  { label:'BEAR TREND', cls:'regime-bear',     prob:8,  color:'#ff4757' },
  { label:'VOLATILE',   cls:'regime-volatile', prob:3,  color:'#3b82f6' },
];

// ── Ticker strip ──────────────────────────────────────────────────────────
function renderTicker() {
  const strip = document.getElementById('ticker-strip');
  strip.innerHTML = TICKERS.slice(0,6).map(t => {
    const p = t.prices, last = p[p.length-1], prev = p[p.length-2];
    const chg = last - prev, pct = (chg/prev*100).toFixed(2);
    const cls = chg >= 0 ? 'up' : 'down', sign = chg >= 0 ? '+' : '';
    return `<div class="ticker-item">
      <span class="ticker-sym">${t.sym}</span>
      <span class="ticker-price">${last.toLocaleString(undefined,{maximumFractionDigits:2})}</span>
      <span class="${cls}">${sign}${pct}%</span>
    </div>`;
  }).join('');
}

// ── Chart panel ───────────────────────────────────────────────────────────
let chartInstances = {};
function buildChartPanel(ticker, idx) {
  const p = ticker.prices;
  const last = p[p.length-1], first = p[0];
  const chg = last - first, pct = (chg/first*100).toFixed(2);
  const isUp = chg >= 0;
  const id = 'chart-' + ticker.sym.replace(/[^a-z0-9]/gi,'');
  const open = p[p.length-2]||last, high = Math.max(...p.slice(-20));
  const low  = Math.min(...p.slice(-20)), vol = Math.floor(Math.random()*80+20);

  setTimeout(() => {
    if (chartInstances[id]) { chartInstances[id].destroy(); }
    const ctx = document.getElementById(id);
    if (!ctx) return;
    chartInstances[id] = new Chart(ctx, {
      type: 'line',
      data: {
        labels: p.map((_, i) => i),
        datasets: [{
          data: p,
          borderColor: isUp ? '#00d4aa' : '#ff4757',
          borderWidth: 1.5,
          fill: true,
          tension: 0.3,
          pointRadius: 0,
          backgroundColor: (ctx2) => {
            const g = ctx2.chart.ctx.createLinearGradient(0,0,0,80);
            g.addColorStop(0, isUp ? 'rgba(0,212,170,0.15)' : 'rgba(255,71,87,0.15)');
            g.addColorStop(1, 'rgba(0,0,0,0)');
            return g;
          }
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false }, tooltip: { mode:'index', intersect:false,
          callbacks: { label: c => ` $${c.parsed.y.toLocaleString(undefined,{maximumFractionDigits:2})}` }
        }},
        scales: { x: { display: false }, y: { display: false } },
        animation: { duration: 400 }
      }
    });
  }, 50 + idx * 30);

  const fmt = v => v.toLocaleString(undefined, { maximumFractionDigits: 2 });
  return `<div class="panel">
    <div class="panel-header">
      <span class="panel-title">${ticker.sym} — 1Y Daily</span>
      <span class="price-change ${isUp?'up':'down'}">${isUp?'+':''}${pct}%</span>
    </div>
    <div class="panel-body">
      <div class="price-row">
        <span class="price-main">$${fmt(last)}</span>
        <span class="price-change ${isUp?'up':'down'}">${isUp?'+':''}${fmt(chg)}</span>
      </div>
      <div class="price-sub">
        <span><label>Open</label><strong>$${fmt(open)}</strong></span>
        <span><label>High 20d</label><strong>$${fmt(high)}</strong></span>
        <span><label>Low 20d</label><strong>$${fmt(low)}</strong></span>
        <span><label>Vol</label><strong>${vol}M</strong></span>
      </div>
      <canvas id="${id}" height="80" style="margin-top:10px"></canvas>
    </div>
  </div>`;
}

// ── Risk metrics ──────────────────────────────────────────────────────────
function buildRiskPanel() {
  const items = [
    { label:'VaR (95%)', val:RISK.var95, cls:'down', sub:'1-day value at risk' },
    { label:'CVaR (95%)', val:RISK.cvar95, cls:'down', sub:'Expected shortfall' },
    { label:'Sharpe', val:RISK.sharpe, cls:'up', sub:'Risk-adjusted return' },
    { label:'Sortino', val:RISK.sortino, cls:'up', sub:'Downside deviation adj.' },
    { label:'Max DD', val:RISK.maxDD, cls:'down', sub:'Peak-to-trough' },
    { label:'Beta', val:RISK.beta, cls:'neutral', sub:'vs SPY' },
  ].map(m => `
    <div class="metric-item">
      <div class="metric-label">${m.label}</div>
      <div class="metric-value ${m.cls}">${m.val}</div>
      <div class="metric-sub">${m.sub}</div>
    </div>`).join('');
  return `<div class="panel">
    <div class="panel-header">
      <span class="panel-title">Portfolio Risk Metrics</span>
      <span class="panel-badge">VaR • CVaR • Sharpe</span>
    </div>
    <div class="panel-body"><div class="metrics-grid">${items}</div></div>
  </div>`;
}

// ── Regime ────────────────────────────────────────────────────────────────
function buildRegimePanel() {
  const top = REGIMES[0];
  const bars = REGIMES.map(r => `
    <div class="prob-bar">
      <span class="prob-label">${r.label}</span>
      <div class="prob-track">
        <div class="prob-fill" style="width:${r.prob}%;background:${r.color}"></div>
      </div>
      <span class="prob-pct">${r.prob}%</span>
    </div>`).join('');
  return `<div class="panel">
    <div class="panel-header">
      <span class="panel-title">Market Regime (HMM)</span>
      <span class="panel-badge">neural-trader</span>
    </div>
    <div class="panel-body">
      <div class="regime-top">
        <span class="regime-badge ${top.cls}">${top.label}</span>
        <span class="regime-conf">Confidence: ${top.prob}%</span>
      </div>
      <div class="regime-strat">
        Recommended: Trend-following momentum strategies. Increase equity exposure.
        Reduce cash & hedges. Avoid counter-trend positions.
      </div>
      ${bars}
    </div>
  </div>`;
}

// ── P&L curve ─────────────────────────────────────────────────────────────
function buildPnLPanel() {
  const prices = genSeries(252, 100000, 0.007, 99);
  const last = prices[prices.length-1];
  const gain = last - 100000, pct = (gain/100000*100).toFixed(2);
  const id = 'chart-pnl';
  setTimeout(() => {
    if (chartInstances[id]) chartInstances[id].destroy();
    const ctx = document.getElementById(id);
    if (!ctx) return;
    chartInstances[id] = new Chart(ctx, {
      type: 'line',
      data: {
        labels: prices.map((_,i)=>i),
        datasets: [
          {
            label: 'Portfolio',
            data: prices,
            borderColor: '#00d4aa',
            borderWidth: 2,
            fill: true,
            tension: 0.3,
            pointRadius: 0,
            backgroundColor: (ctx2) => {
              const g = ctx2.chart.ctx.createLinearGradient(0,0,0,150);
              g.addColorStop(0,'rgba(0,212,170,0.2)');
              g.addColorStop(1,'rgba(0,212,170,0)');
              return g;
            }
          },
          {
            label: 'Benchmark',
            data: genSeries(252, 100000, 0.005, 55),
            borderColor: '#3b82f6',
            borderWidth: 1.5,
            borderDash: [4,4],
            fill: false,
            tension: 0.3,
            pointRadius: 0,
          }
        ]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: true, labels: { color: '#64748b', font: { size: 10 }, boxWidth: 12 } },
          tooltip: { mode:'index', intersect:false }
        },
        scales: {
          x: { display: false },
          y: { display: true, grid: { color: 'rgba(30,45,74,0.5)' },
               ticks: { color:'#64748b', font:{size:10},
                 callback: v => '$' + (v/1000).toFixed(0) + 'k' } }
        }
      }
    });
  }, 80);
  return `<div class="panel panel-wide">
    <div class="panel-header">
      <span class="panel-title">Portfolio P&L — YTD</span>
      <span class="price-change ${gain>=0?'up':'down'}">${gain>=0?'+':''}${pct}% vs Benchmark</span>
    </div>
    <div class="panel-body">
      <div class="pnl-stats">
        <div class="pnl-stat"><label>Start Value</label><span>$100,000</span></div>
        <div class="pnl-stat"><label>Current</label><span class="up">$${last.toLocaleString(undefined,{maximumFractionDigits:0})}</span></div>
        <div class="pnl-stat"><label>Gain</label><span class="up">+$${gain.toLocaleString(undefined,{maximumFractionDigits:0})}</span></div>
        <div class="pnl-stat"><label>Win Rate</label><span>61.4%</span></div>
        <div class="pnl-stat"><label>Trades</label><span>247</span></div>
        <div class="pnl-stat"><label>Avg Hold</label><span>4.2 days</span></div>
      </div>
      <canvas id="${id}" height="140"></canvas>
    </div>
  </div>`;
}

// ── Order book ────────────────────────────────────────────────────────────
function buildOrderBookPanel(ticker) {
  const mid = ticker.prices[ticker.prices.length-1];
  const asks = Array.from({length:6},(_,i) => ({
    price: +(mid * (1 + (i+1)*0.0002)).toFixed(2),
    size:  +(Math.random()*80+5).toFixed(1)
  })).reverse();
  const bids = Array.from({length:6},(_,i) => ({
    price: +(mid * (1 - (i+1)*0.0002)).toFixed(2),
    size:  +(Math.random()*80+5).toFixed(1)
  }));
  const maxSz = Math.max(...asks.map(a=>a.size), ...bids.map(b=>b.size));
  const spread = (asks[asks.length-1].price - bids[0].price).toFixed(2);
  const askRows = asks.map(a => `
    <div class="book-row">
      <div class="book-row-fill" style="width:${a.size/maxSz*100}%"></div>
      <span class="book-price-ask">${a.price.toFixed(2)}</span>
      <span class="book-size">${a.size}</span>
    </div>`).join('');
  const bidRows = bids.map(b => `
    <div class="book-row">
      <div class="book-row-fill" style="width:${b.size/maxSz*100}%"></div>
      <span class="book-price-bid">${b.price.toFixed(2)}</span>
      <span class="book-size">${b.size}</span>
    </div>`).join('');
  return `<div class="panel">
    <div class="panel-header">
      <span class="panel-title">Order Book — ${ticker.sym}</span>
      <span class="panel-badge">L2</span>
    </div>
    <div class="panel-body">
      <div class="book-side book-ask">${askRows}</div>
      <div class="book-spread">Spread: $${spread} &nbsp;│&nbsp; Mid: $${mid.toLocaleString(undefined,{maximumFractionDigits:2})}</div>
      <div class="book-side book-bid">${bidRows}</div>
    </div>
  </div>`;
}

// ── Signal table ──────────────────────────────────────────────────────────
function buildSignalsPanel() {
  const rows = SIGNALS.map(s => {
    const cls = s.sig==='LONG' ? 'sig-long' : s.sig==='SHORT' ? 'sig-short' : 'sig-flat';
    const strColor = s.str > 70 ? '#00d4aa' : s.str > 55 ? '#f59e0b' : '#64748b';
    const fmt = v => v === null ? '—' : typeof v === 'number' && v > 100 ? v.toLocaleString(undefined,{maximumFractionDigits:0}) : v;
    return `<tr>
      <td style="color:var(--accent-blue);font-weight:bold">${s.sym}</td>
      <td class="${cls}">${s.sig}</td>
      <td>
        <span class="str-bar" style="width:${s.str*0.6}px;background:${strColor}"></span>
        <span style="margin-left:4px;color:${strColor}">${s.str}</span>
      </td>
      <td>${fmt(s.entry)}</td>
      <td class="down">${fmt(s.sl)}</td>
      <td class="up">${fmt(s.tp)}</td>
      <td style="color:var(--text-secondary)">${s.tf}</td>
    </tr>`;
  }).join('');
  return `<div class="panel panel-wide">
    <div class="panel-header">
      <span class="panel-title">Active Signals</span>
      <span class="panel-badge">trader-regime • neural-trader</span>
    </div>
    <div class="panel-body" style="padding:0">
      <table class="signal-table">
        <thead><tr>
          <th>Symbol</th><th>Signal</th><th>Strength</th>
          <th>Entry</th><th>Stop</th><th>Target</th><th>TF</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

// ── Watchlist panel ───────────────────────────────────────────────────────
function buildWatchlistPanel() {
  const rows = TICKERS.map(t => {
    const p = t.prices, last = p[p.length-1], prev = p[p.length-2];
    const chg = last-prev, pct = (chg/prev*100).toFixed(2);
    const cls = chg>=0?'up':'down', sign = chg>=0?'+':'';
    const high = Math.max(...p.slice(-20)), low = Math.min(...p.slice(-20));
    const pos = ((last-low)/(high-low)*100).toFixed(0);
    return `<tr>
      <td>${t.sym}</td>
      <td>${last.toLocaleString(undefined,{maximumFractionDigits:2})}</td>
      <td class="${cls}">${sign}${chg.toFixed(2)}</td>
      <td class="${cls}">${sign}${pct}%</td>
      <td style="color:var(--text-secondary)">${pos}%</td>
    </tr>`;
  }).join('');
  return `<div class="panel">
    <div class="panel-header">
      <span class="panel-title">Watchlist</span>
      <span class="panel-badge">${TICKERS.length} instruments</span>
    </div>
    <div class="panel-body" style="padding:0">
      <table class="watchlist">
        <thead><tr><th>Symbol</th><th>Price</th><th>Chg</th><th>%</th><th>20d Pos</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

// ── Render ────────────────────────────────────────────────────────────────
function refresh() {
  Object.values(chartInstances).forEach(c => { try { c.destroy(); } catch(e){} });
  chartInstances = {};

  const panels = [
    buildPnLPanel(),
    buildChartPanel(TICKERS[0], 0),
    buildChartPanel(TICKERS[6], 1),
    buildRiskPanel(),
    buildRegimePanel(),
    buildWatchlistPanel(),
    buildSignalsPanel(),
    buildOrderBookPanel(TICKERS[0]),
    buildChartPanel(TICKERS[3], 2),
  ];

  document.getElementById('grid').innerHTML = panels.join('');
  renderTicker();
  document.getElementById('sb-last-refresh').textContent =
    'Last refresh: ' + new Date().toLocaleTimeString('en-US',{hour12:false});
  document.getElementById('sb-panels').textContent = panels.length + ' panels';
}

refresh();

// ── Command palette ───────────────────────────────────────────────────────
const COMMANDS = [
  { label:'Toggle Theme (dark/light)', key:'T', action: toggleTheme, section:'View' },
  { label:'Refresh All Panels', key:'R', action: refresh, section:'View' },
  { label:'Switch Mode (Demo/Live)', key:'M', action: toggleMode, section:'Data' },
  { label:'Export Watchlist CSV', key:'', action: exportCSV, section:'Data' },
  { label:'Open Command Palette', key:'⌘K', action: openCmdPalette, section:'View' },
];

let cmdActiveIdx = 0;
function renderCmdList(items) {
  const grouped = {};
  items.forEach(c => { (grouped[c.section] = grouped[c.section]||[]).push(c); });
  let html = '';
  Object.entries(grouped).forEach(([sec, cmds]) => {
    html += `<div class="cmd-section-label">${sec}</div>`;
    cmds.forEach((c, i) => {
      html += `<div class="cmd-item${i===0&&sec===Object.keys(grouped)[0]?' active':''}"
        onclick="runCmd(${COMMANDS.indexOf(c)})">
        <span class="cmd-item-label">${c.label}</span>
        ${c.key ? `<span class="cmd-item-key">${c.key}</span>` : ''}
      </div>`;
    });
  });
  document.getElementById('cmd-list').innerHTML = html;
}

function openCmdPalette() {
  document.getElementById('cmd-overlay').classList.add('open');
  const inp = document.getElementById('cmd-input');
  inp.value = '';
  renderCmdList(COMMANDS);
  setTimeout(() => inp.focus(), 30);
}
function closeCmdPalette() {
  document.getElementById('cmd-overlay').classList.remove('open');
}
function overlayClick(e) {
  if (e.target === document.getElementById('cmd-overlay')) closeCmdPalette();
}
function filterCmds(q) {
  const filtered = COMMANDS.filter(c => c.label.toLowerCase().includes(q.toLowerCase()));
  renderCmdList(filtered);
}
function handleCmdKey(e) {
  if (e.key === 'Escape') { closeCmdPalette(); return; }
  if (e.key === 'Enter') {
    const first = document.querySelector('.cmd-item');
    if (first) first.click();
  }
}
function runCmd(idx) {
  closeCmdPalette();
  COMMANDS[idx].action();
}

function exportCSV() {
  const rows = [['Symbol','Price','Chg','Pct']].concat(
    TICKERS.map(t => {
      const p = t.prices, last = p[p.length-1], prev = p[p.length-2];
      const chg = (last-prev).toFixed(4), pct = ((last-prev)/prev*100).toFixed(2)+'%';
      return [t.sym, last.toFixed(4), chg, pct];
    })
  );
  const csv = rows.map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type:'text/csv' }));
  a.download = 'wst-watchlist.csv';
  a.click();
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openCmdPalette(); }
  if (e.key === 't' || e.key === 'T') toggleTheme();
  if (e.key === 'r' || e.key === 'R') refresh();
  if (e.key === 'm' || e.key === 'M') toggleMode();
  if (e.key === 'Escape') closeCmdPalette();
});

// ── Live ticker animation ─────────────────────────────────────────────────
setInterval(renderTicker, 3000);
</script>

</html>
