name: CI/CD — Tests, Build & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ═══════════════════════════════════════════════════════════════
  # 1. TESTS — запускаются на каждом push/PR
  # ═══════════════════════════════════════════════════════════════
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --cov=core --cov=bots --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ═══════════════════════════════════════════════════════════════
  # 2. BUILD — собираем Docker образы (только на push в main)
  # ═══════════════════════════════════════════════════════════════
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Crypto Bot
        id: meta-crypto
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-crypto
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Crypto Bot
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.crypto
          push: true
          tags: ${{ steps.meta-crypto.outputs.tags }}
          labels: ${{ steps.meta-crypto.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for Kalshi Bot
        id: meta-kalshi
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-kalshi
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Kalshi Bot
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.kalshi
          push: true
          tags: ${{ steps.meta-kalshi.outputs.tags }}
          labels: ${{ steps.meta-kalshi.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════════════════════════
  # 3. DEPLOY — деплой на VPS (только на push в main, после build)
  # ═══════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/trading
            echo "--- Pulling latest images ---"
            docker compose pull
            echo "--- Rolling restart ---"
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "--- Status ---"
            docker compose ps
            echo "✅ Deploy completed at $(date)"

      - name: Notify Telegram (optional)
        if: always()
        run: |
          if [ "${{ secrets.TELEGRAM_BOT_TOKEN }}" != "" ] && [ "${{ secrets.TELEGRAM_CHAT_ID }}" != "" ]; then
            STATUS="${{ job.status }}"
            ICON="✅"
            [ "$STATUS" != "success" ] && ICON="❌"
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d text="${ICON} <b>Deploy ${{ github.repository }}</b>%0AStatus: $STATUS%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.sha::8 }}%0ATime: $(date)" \
              -d parse_mode="HTML"
          fi